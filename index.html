<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RungSura Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    .dept-card { transition: all 0.2s ease; cursor: pointer; }
    .dept-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(251,191,36,0.18); }
    .sidebar-item.active { background: #FFFBEB; border-right: 3px solid #FBBF24; color: #92400E; font-weight: 600; }
    .chat-panel { transition: transform 0.3s cubic-bezier(.4,0,.2,1); }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
    .task-item:hover { background: #FFFBEB; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #FBBF24; border-radius: 3px; }
    .spinner { border: 3px solid #FDE68A; border-top-color: #FBBF24; border-radius: 50%; width: 28px; height: 28px; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
<div class="flex h-screen overflow-hidden">
  <aside class="w-56 bg-white border-r border-gray-100 flex flex-col flex-shrink-0 shadow-sm">
    <div class="p-5 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-amber-400 rounded-xl flex items-center justify-center text-white font-bold shadow-sm">RS</div>
        <div><div class="font-bold text-gray-900 text-sm">RungSura</div><div class="text-xs text-gray-400">Co.,Ltd.</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-0.5">
      <a href="/" class="sidebar-item active w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 hover:bg-amber-50 block">🏠 Dashboard</a>
      <div class="pt-3 pb-1 px-3 text-xs text-gray-400 font-semibold uppercase tracking-wider">แผนก</div>
      <a href="/noix.html"    class="sidebar-item w-full px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 hover:bg-amber-50 block">☕ Noix &amp; Coff</a>
      <a href="/cheywit.html" class="sidebar-item w-full px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 hover:bg-amber-50 block">🎬 Cheywit Media</a>
      <a href="/walnut.html"  class="sidebar-item w-full px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 hover:bg-amber-50 block">🎵 Walnut Learning</a>
      <a href="/newbiz.html"  class="sidebar-item w-full px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 hover:bg-amber-50 block">🚀 New Business</a>
    </nav>
    <div class="p-4 border-t border-gray-100">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-amber-400 rounded-full flex items-center justify-center text-white text-xs font-bold">W</div>
        <div><div class="text-xs font-semibold text-gray-700">Wit</div><div id="sb-status" class="text-xs text-gray-400">กำลังเชื่อม...</div></div>
        <button onclick="openSettings()" class="ml-auto text-gray-300 hover:text-amber-500 text-lg">⚙️</button>
      </div>
    </div>
  </aside>
  <main class="flex-1 overflow-y-auto">
    <div id="app" class="p-6 max-w-5xl mx-auto"><div class="flex justify-center items-center h-64"><div class="spinner"></div></div></div>
  </main>
</div>

<button onclick="toggleChat()" id="chat-btn" class="fixed bottom-6 right-6 w-14 h-14 bg-amber-400 hover:bg-amber-500 text-white rounded-full shadow-xl flex items-center justify-center text-2xl z-40 hover:scale-105 transition-all">💬</button>

<div id="chat-panel" class="fixed right-0 top-0 h-full w-96 bg-white shadow-2xl border-l border-gray-100 z-50 flex flex-col chat-panel translate-x-full">
  <div class="p-4 border-b bg-amber-50 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-amber-400 rounded-xl flex items-center justify-center text-white font-bold">AI</div>
      <div><div class="font-semibold text-sm">Claude Assistant</div><div class="text-xs text-gray-500">RungSura AI</div></div>
    </div>
    <button onclick="toggleChat()" class="text-gray-400 text-2xl">&times;</button>
  </div>
  <div id="chat-msgs" class="flex-1 overflow-y-auto p-4 space-y-3">
    <div class="flex gap-2"><div class="w-7 h-7 bg-amber-400 rounded-full flex items-center justify-center text-white text-xs mt-0.5">AI</div>
    <div class="bg-amber-50 rounded-2xl rounded-tl-none px-4 py-3 text-sm max-w-xs">สวัสดีครับ! ถามเรื่องงานได้เลยครับ 😊</div></div>
  </div>
  <div class="p-4 border-t bg-gray-50 flex gap-2">
    <input id="chat-in" type="text" placeholder="พิมพ์คำถาม..." onkeydown="if(event.key==='Enter')sendChat()"
      class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-400 bg-white">
    <button onclick="sendChat()" class="bg-amber-400 hover:bg-amber-500 text-white w-11 h-11 rounded-xl flex items-center justify-center text-lg">➤</button>
  </div>
</div>
<div id="overlay" class="fixed inset-0 bg-black/20 z-40 hidden" onclick="toggleChat()"></div>

<div id="settings-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/30">
  <div class="bg-white rounded-2xl shadow-2xl w-[480px] p-6">
    <h2 class="font-bold mb-4">⚙️ ตั้งค่า API Keys</h2>
    <div class="space-y-3">
      <div><label class="text-xs font-semibold text-gray-500 block mb-1">Claude API Key</label>
        <input id="s-claude" type="password" placeholder="sk-ant-..." class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-400"></div>
      <div><label class="text-xs font-semibold text-gray-500 block mb-1">Supabase URL</label>
        <input id="s-url" type="text" placeholder="https://xxx.supabase.co" class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-400"></div>
      <div><label class="text-xs font-semibold text-gray-500 block mb-1">Supabase Anon Key</label>
        <input id="s-key" type="password" placeholder="eyJ..." class="w-full border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-amber-400"></div>
      <p class="text-xs text-gray-400">Keys เก็บใน localStorage เครื่องนี้เท่านั้น</p>
    </div>
    <div class="flex gap-2 mt-5">
      <button onclick="saveSettings()" class="flex-1 bg-amber-400 hover:bg-amber-500 text-white py-2.5 rounded-xl font-semibold">บันทึกและ Reload</button>
      <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="px-5 py-2.5 rounded-xl border text-gray-600 hover:bg-gray-50">ยกเลิก</button>
    </div>
  </div>
</div>

<script>
const CFG = {
  get claude(){ return localStorage.getItem('rs_claude')||''; },
  get sbUrl() { return localStorage.getItem('rs_sb_url')||''; },
  get sbKey() { return localStorage.getItem('rs_sb_key')||''; },
};
const DEPTS = [
  {id:1,name:'Noix & Coff',   icon:'☕',desc:'ร้านกาแฟ สุขุมวิท ซอย 62', iconBg:'bg-amber-400',border:'border-amber-200',href:'/noix.html'},
  {id:2,name:'Cheywit Media', icon:'🎬',desc:'Social Media Content',       iconBg:'bg-blue-400', border:'border-blue-200', href:'/cheywit.html'},
  {id:3,name:'Walnut Learning',icon:'🎵',desc:'การศึกษา + อาชีพนักร้อง',  iconBg:'bg-pink-400', border:'border-pink-200', href:'/walnut.html'},
  {id:4,name:'New Business',   icon:'🚀',desc:'ธุรกิจใหม่ในอนาคต',        iconBg:'bg-gray-400', border:'border-gray-200', href:'/newbiz.html'},
];
const TODAY = new Date().toISOString().slice(0,10);
let sb=null, tasks=[], chatOpen=false, chatHistory=[];

function initSb(){
  if(!CFG.sbUrl||!CFG.sbKey){setStatus('ยังไม่ได้ตั้งค่า ⚙️',false);return false;}
  try{sb=supabase.createClient(CFG.sbUrl,CFG.sbKey);setStatus('เชื่อมต่อแล้ว ✅',true);return true;}
  catch(e){setStatus('เชื่อมไม่ได้ ❌',false);return false;}
}
function setStatus(t,ok){
  const el=document.getElementById('sb-status');
  el.textContent=t; el.className=`text-xs ${ok?'text-green-500':'text-red-400'}`;
}

function render(){
  const today=tasks.filter(t=>t.due===TODAY&&t.status!=='done');
  const over=tasks.filter(t=>t.due<TODAY&&t.status!=='done');
  const all=[...over,...today].sort((a,b)=>a.due<b.due?-1:1);
  const ds=new Date().toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const cards=DEPTS.map(d=>{
    const dt=tasks.filter(t=>t.dept===d.id&&t.due===TODAY&&t.status!=='done');
    const ov=tasks.filter(t=>t.dept===d.id&&t.due<TODAY&&t.status!=='done');
    const pv=[...ov,...dt].slice(0,3);
    return `<div class="dept-card bg-white border ${d.border} rounded-2xl p-5" onclick="location.href='${d.href}'">
      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="${d.iconBg} w-11 h-11 rounded-xl flex items-center justify-center text-2xl shadow-sm">${d.icon}</div>
          <div><div class="font-bold text-gray-900 text-sm">${d.name}</div><div class="text-xs text-gray-400 mt-0.5">${d.desc}</div></div>
        </div>
        <svg class="w-4 h-4 text-gray-300 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </div>
      <div class="flex gap-1.5 mb-3">
        <span class="status-badge bg-amber-100 text-amber-700">📅 ${dt.length}</span>
        ${ov.length?`<span class="status-badge bg-pink-100 text-pink-600">⚠️ ${ov.length}</span>`:'<span class="status-badge bg-green-100 text-green-600">✨ ไม่ค้าง</span>'}
      </div>
      <div class="space-y-1.5">${pv.length?pv.map(t=>`<div class="flex items-center gap-2 text-xs ${t.due<TODAY?'text-pink-500':'text-gray-500'}"><span>${t.due<TODAY?'🔴':'🟡'}</span><span class="truncate">${t.title}</span></div>`).join(''):'<div class="text-xs text-gray-300 italic">ไม่มีงานค้าง</div>'}</div>
    </div>`;
  }).join('');

  const rows=all.map(t=>{
    const d=DEPTS.find(x=>x.id===t.dept);
    return `<div class="task-item flex items-center gap-3 p-3 rounded-xl border border-gray-50 cursor-pointer" onclick="location.href='${d.href}'">
      <div class="${d.iconBg} w-8 h-8 rounded-lg flex items-center justify-center text-base flex-shrink-0">${d.icon}</div>
      <div class="flex-1 min-w-0"><div class="text-sm font-medium text-gray-800 truncate">${t.title}</div><div class="text-xs text-gray-400">${d.name} · ${t.assignee}</div></div>
      <div class="flex items-center gap-2">${t.due<TODAY?`<span class="status-badge bg-pink-100 text-pink-600">ค้าง ${t.due}</span>`:`<span class="status-badge bg-amber-100 text-amber-700">วันนี้</span>`}${t.priority==='high'?'<span>🔥</span>':''}</div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML=`
    <div class="mb-6 flex items-center justify-between">
      <div><h1 class="text-2xl font-bold text-gray-900">RungSura Dashboard</h1><p class="text-gray-400 text-sm mt-1">${ds}</p></div>
      <div class="flex gap-3">
        <div class="bg-amber-50 border border-amber-200 rounded-2xl px-5 py-2.5 text-center"><div class="text-2xl font-bold text-amber-500">${today.length}</div><div class="text-xs text-amber-700">งานวันนี้</div></div>
        <div class="bg-pink-50 border border-pink-200 rounded-2xl px-5 py-2.5 text-center"><div class="text-2xl font-bold text-pink-500">${over.length}</div><div class="text-xs text-pink-700">ค้างอยู่</div></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-6">${cards}</div>
    <div class="bg-white rounded-2xl border border-gray-100 p-5">
      <h2 class="font-bold text-gray-900 mb-4 flex items-center gap-2">📋 งานวันนี้ + ค้าง <span class="ml-auto status-badge bg-gray-100 text-gray-500">${all.length} รายการ</span></h2>
      ${rows||'<div class="text-center text-gray-300 py-8 text-sm">✨ ไม่มีงานค้าง</div>'}
    </div>`;
}

function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chat-panel').classList.toggle('translate-x-full',!chatOpen);
  document.getElementById('overlay').classList.toggle('hidden',!chatOpen);
  document.getElementById('chat-btn').innerHTML=chatOpen?'✕':'💬';
}
function addMsg(role,text){
  const isUser=role==='user';
  document.getElementById('chat-msgs').insertAdjacentHTML('beforeend',
    `<div class="flex gap-2 ${isUser?'flex-row-reverse':''}">
      <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs mt-0.5 ${isUser?'bg-blue-400':'bg-amber-400'}">${isUser?'W':'AI'}</div>
      <div class="${isUser?'bg-blue-50 rounded-2xl rounded-tr-none ml-8':'bg-amber-50 rounded-2xl rounded-tl-none mr-8'} px-4 py-3 text-sm whitespace-pre-wrap">${text}</div>
    </div>`);
  document.getElementById('chat-msgs').scrollTop=9999;
}
async function sendChat(){
  const inp=document.getElementById('chat-in');
  const msg=inp.value.trim(); if(!msg)return;
  inp.value=''; addMsg('user',msg); chatHistory.push({role:'user',content:msg});
  if(!CFG.claude){addMsg('assistant','⚠️ ใส่ Claude API Key ก่อน กด ⚙️ ครับ');return;}
  const lid='l'+Date.now();
  document.getElementById('chat-msgs').insertAdjacentHTML('beforeend',
    `<div id="${lid}" class="flex gap-2"><div class="w-7 h-7 bg-amber-400 rounded-full flex items-center justify-center text-white text-xs">AI</div><div class="bg-amber-50 rounded-2xl px-4 py-3 text-sm text-gray-400 animate-pulse">กำลังคิด...</div></div>`);
  document.getElementById('chat-msgs').scrollTop=9999;
  const pend=tasks.filter(t=>(t.due===TODAY||t.due<TODAY)&&t.status!=='done').map(t=>`- ${t.title}`).join('\n');
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,
        system:`ผู้ช่วย AI ของ RungSura Co.,Ltd. (Wit CEO)\n4 แผนก: Noix&Coff, Cheywit Media, Walnut Learning, New Business\nงานค้าง:${pend||'ไม่มี'}\nตอบภาษาไทย กระชับ`,
        messages:chatHistory})});
    const d=await r.json();
    const reply=d.content?.[0]?.text||'เกิดข้อผิดพลาด';
    document.getElementById(lid)?.remove();
    chatHistory.push({role:'assistant',content:reply}); addMsg('assistant',reply);
  }catch(e){document.getElementById(lid)?.remove();addMsg('assistant',`❌ ${e.message}`);}
}

function openSettings(){
  document.getElementById('s-claude').value=CFG.claude;
  document.getElementById('s-url').value=CFG.sbUrl;
  document.getElementById('s-key').value=CFG.sbKey;
  document.getElementById('settings-modal').classList.remove('hidden');
}
function saveSettings(){
  localStorage.setItem('rs_claude',document.getElementById('s-claude').value.trim());
  localStorage.setItem('rs_sb_url',document.getElementById('s-url').value.trim());
  localStorage.setItem('rs_sb_key',document.getElementById('s-key').value.trim());
  location.reload();
}

async function init(){
  const ok=initSb();
  if(ok){const{data,error}=await sb.from('tasks').select('*').order('due');if(!error)tasks=data;}
  render();
}
init();
</script>
</body>
</html>
