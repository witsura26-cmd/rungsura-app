  <style>
    * { font-family: 'Sarabun', sans-serif; }
    .dept-card { transition: all 0.2s ease; }
    .dept-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(251,191,36,0.18); }
    .tab-active { border-bottom: 3px solid #FBBF24; color: #92400E; font-weight: 600; }
    .task-item:hover { background: #FFFBEB; }
    .sidebar-item.active { background: #FFFBEB; border-right: 3px solid #FBBF24; color: #92400E; font-weight: 600; }
    .chat-panel { transition: transform 0.3s cubic-bezier(.4,0,.2,1); }
    .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #FBBF24; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: #f9fafb; }
    .progress-bar { transition: width 0.4s ease; }
    .timeline-line { position: absolute; left: 19px; top: 40px; bottom: 0; width: 2px; background: #FDE68A; }
    .spinner { border: 3px solid #FDE68A; border-top-color: #FBBF24; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  </style>
</head>

<script>
// ─── CONFIG ────────────────────────────────────────────────
const CFG = {
  get claude() { return localStorage.getItem('rs_claude') || ''; },
  get sbUrl()  { return localStorage.getItem('rs_sb_url') || ''; },
  get sbKey()  { return localStorage.getItem('rs_sb_key') || ''; },
};

// ─── SUPABASE ──────────────────────────────────────────────
let sb = null;

function initSupabase() {
  if (!CFG.sbUrl || !CFG.sbKey) {
    setStatus('ยังไม่ได้ตั้งค่า', false);
    return false;
  }
  try {
    sb = supabase.createClient(CFG.sbUrl, CFG.sbKey);
    setStatus('เชื่อมต่อแล้ว ✅', true);
    return true;
  } catch(e) {
    setStatus('เชื่อมไม่ได้ ❌', false);
    return false;
  }
}

function setStatus(text, ok) {
  const el = document.getElementById('sb-status');
  el.textContent = text;
  el.className = `text-xs ${ok ? 'text-green-500' : 'text-red-400'}`;
}

// ─── STATIC DATA (flow, employees, timeline) ───────────────
const DEPTS = [
  { id:1, name:'Noix & Coff',    icon:'☕', desc:'ร้านกาแฟ สุขุมวิท ซอย 62',   iconBg:'bg-amber-400', border:'border-amber-200' },

  { id:3, name:'Walnut Learning',icon:'🎵', desc:'การศึกษา + อาชีพนักร้อง',      iconBg:'bg-pink-400',  border:'border-pink-200'  },
  { id:4, name:'New Business',   icon:'🚀', desc:'ธุรกิจใหม่ในอนาคต',            iconBg:'bg-gray-400',  border:'border-gray-200'  },
];

const EMPLOYEES = {

    { name:'ต้น',          role:'Barista',              avatar:'👨‍🍳', status:'active' },

const FLOWS = {

    { icon:'📝', name:'รับ Order',     desc:'รับออเดอร์จากลูกค้า' },

// ─── STATE ─────────────────────────────────────────────────
const TODAY = new Date().toISOString().slice(0,10);
let route = 'dashboard';
let deptTab = 'tasks';
let chatOpen = false;
let chatHistory = [];
let addingToDept = null;

// cache ข้อมูลจาก Supabase
let cache = { tasks: [], projects: [], timeline: [] };

// ─── TOAST ─────────────────────────────────────────────────
function showToast(msg, ms=2500) {
  const t = document.getElementById('toast');
  t.querySelector('div').textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), ms);
}

// ─── SUPABASE DATA LAYER ────────────────────────────────────
async function loadAll() {
  if (!sb) return;
  const [t, p, tl] = await Promise.all([
    sb.from('tasks').select('*').order('due'),
    sb.from('projects').select('*').order('id'),
    sb.from('timeline_events').select('*').order('date'),
  ]);
  if (!t.error) cache.tasks    = t.data;
  if (!p.error) cache.projects = p.data;
  if (!tl.error) cache.timeline = tl.data;
}

async function dbToggleDone(id, currentStatus) {
  const newStatus = currentStatus === 'done' ? 'todo' : 'done';
  const { error } = await sb.from('tasks').update({ status: newStatus }).eq('id', id);
  if (error) { showToast('❌ บันทึกไม่ได้'); return; }
  const t = cache.tasks.find(x=>x.id===id);
  if (t) t.status = newStatus;
  showToast(newStatus === 'done' ? '✅ เสร็จแล้ว!' : '↩️ ยกเลิกแล้ว');
  filterTasks(t.dept, 'ทั้งหมด');
  updateDashboardCounts();
}

async function dbAddTask(deptId, title, assignee, priority, due) {
  const { data, error } = await sb.from('tasks')
    .insert({ dept: deptId, title, assignee, priority, due, status: 'todo' })
    .select().single();
  if (error) { showToast('❌ เพิ่มไม่ได้: ' + error.message); return; }
  cache.tasks.push(data);
  showToast('✅ เพิ่ม Task แล้ว');
  filterTasks(deptId, 'ทั้งหมด');
  updateDashboardCounts();
}

function updateDashboardCounts() {
  if (route !== 'dashboard') return;
  render();
}

// ─── ROUTER ────────────────────────────────────────────────
function navigate(r) {
  route = r;
  deptTab = 'tasks';
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.route === r);
  });
  render();
}

function render() {
  const el = document.getElementById('main-content');
  if (route === 'dashboard') el.innerHTML = renderDashboard();
  else if (route.startsWith('dept/')) el.innerHTML = renderDept(+route.split('/')[1]);
}

// ─── LOADING ───────────────────────────────────────────────
function showLoading() {
  document.getElementById('main-content').innerHTML = `
    <div class="flex items-center justify-center h-64">
      <div class="text-center">
        <div class="spinner mx-auto mb-3"></div>
        <div class="text-sm text-gray-400">กำลังโหลดข้อมูล...</div>
      </div>
    </div>`;
}

// ─── DASHBOARD ─────────────────────────────────────────────
function renderDashboard() {
  const tasks = cache.tasks;
  const todayT  = tasks.filter(t => t.due === TODAY && t.status !== 'done');
  const overdueT = tasks.filter(t => t.due < TODAY  && t.status !== 'done');
  const allPend  = [...overdueT, ...todayT].sort((a,b) => a.due < b.due ? -1 : 1);

  const dateStr = new Date().toLocaleDateString('th-TH', {weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const cards = DEPTS.map(d => {
    const dToday = tasks.filter(t => t.dept===d.id && t.due===TODAY && t.status!=='done');
    const dOver  = tasks.filter(t => t.dept===d.id && t.due<TODAY   && t.status!=='done');
    const preview = [...dOver, ...dToday].slice(0,3);
    return `
      <div class="dept-card bg-white border ${d.border} rounded-2xl p-5 cursor-pointer select-none" onclick="navigate('dept/${d.id}')">
        <div class="flex items-start justify-between mb-3">
          <div class="flex items-center gap-3">
            <div class="${d.iconBg} w-11 h-11 rounded-xl flex items-center justify-center text-2xl shadow-sm">${d.icon}</div>
            <div>
              <div class="font-bold text-gray-900 text-sm">${d.name}</div>
              <div class="text-xs text-gray-400 mt-0.5">${d.desc}</div>
            </div>
          </div>
          <svg class="w-4 h-4 text-gray-300 mt-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </div>
        <div class="flex flex-wrap gap-1.5 mb-3">
          <span class="status-badge bg-amber-100 text-amber-700">📅 วันนี้ ${dToday.length}</span>
          ${dOver.length
            ? `<span class="status-badge bg-pink-100 text-pink-600">⚠️ ค้าง ${dOver.length}</span>`
            : '<span class="status-badge bg-green-100 text-green-600">✨ ไม่ค้าง</span>'}
        </div>
        <div class="space-y-1.5">
          ${preview.length
            ? preview.map(t=>`
              <div class="flex items-center gap-2 text-xs ${t.due < TODAY ? 'text-pink-500':'text-gray-500'}">
                <span>${t.due < TODAY ? '🔴':'🟡'}</span>
                <span class="truncate">${t.title}</span>
              </div>`).join('')
            : '<div class="text-xs text-gray-300 italic">ไม่มีงานค้าง</div>'}
        </div>
      </div>`;
  }).join('');

  const taskRows = allPend.map(t => {
    const d = DEPTS.find(x=>x.id===t.dept);
    const over = t.due < TODAY;
    return `
      <div class="task-item flex items-center gap-3 p-3 rounded-xl border border-gray-50 cursor-pointer transition-colors" onclick="navigate('dept/${t.dept}')">
        <div class="${d.iconBg} w-8 h-8 rounded-lg flex items-center justify-center text-base flex-shrink-0">${d.icon}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-gray-800 truncate">${t.title}</div>

    {id:'tasks',    label:'Tasks',    icon:'✅'},
    {id:'flow',     label:'Flow',     icon:'🔄'},

  ];
  return `

      <button onclick="navigate('dashboard')" class="text-sm text-gray-400 hover:text-amber-500 mb-3 flex items-center gap-1 transition-colors">← กลับ Dashboard</button>
      <div class="flex items-center gap-4">
        <div class="${d.iconBg} w-14 h-14 rounded-2xl flex items-center justify-center text-3xl shadow">${d.icon}</div>

        <button onclick="switchTab('${t.id}',${id})" data-tab="${t.id}"

    <div id="tab-content">${renderTab(id, deptTab)}</div>`;
}

function switchTab(tab, id) {
  deptTab = tab;
  document.querySelectorAll('.dept-tab').forEach(el => {
    el.className = `dept-tab px-4 py-3 text-sm transition-colors ${el.dataset.tab===tab?'tab-active':'text-gray-400 hover:text-gray-700'}`;
  });
  document.getElementById('tab-content').innerHTML = renderTab(id, tab);
}

function renderTab(id, tab) {
  if (tab==='tasks')    return tabTasks(id);
  if (tab==='flow')     return tabFlow(id);
  if (tab==='team')     return tabTeam(id);
  if (tab==='projects') return tabProjects(id);
  if (tab==='timeline') return tabTimeline(id);
  return '';
}

// ─── TAB: TASKS ────────────────────────────────────────────
function tabTasks(id) {
  return `
    <div class="bg-white rounded-b-2xl border border-t-0 border-gray-100 p-5">
      <div class="flex items-center justify-between mb-4">
        <div class="flex gap-1.5" id="tf">
          ${['ทั้งหมด','วันนี้','ค้าง','กำลังทำ','เสร็จแล้ว'].map((f,i)=>`
            <button onclick="filterTasks(${id},'${f}')" data-f="${f}"
              class="tf-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${i===0?'bg-amber-400 text-white':'bg-gray-100 text-gray-500 hover:bg-amber-50'}">
              ${f}
            </button>`).join('')}
        </div>
        <button onclick="openTaskModal(${id})" class="bg-amber-400 hover:bg-amber-500 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-colors">+ เพิ่ม</button>
      </div>
      <div id="task-list">${taskList(cache.tasks.filter(t=>t.dept===id))}</div>
    </div>`;
}

function taskList(tasks) {
  if (!tasks.length) return '<div class="text-center text-gray-300 py-10 text-sm">ไม่มี Task</div>';
  const sc = {
    todo:          { bg:'bg-gray-100',  tx:'text-gray-600',  lb:'รอทำ'    },
    'in-progress': { bg:'bg-blue-100',  tx:'text-blue-600',  lb:'กำลังทำ' },
    done:          { bg:'bg-green-100', tx:'text-green-600', lb:'เสร็จ'   },
    overdue:       { bg:'bg-pink-100',  tx:'text-pink-600',  lb:'ค้าง'    },
  };
  return tasks.map(t => {
    const s = sc[t.status] || sc.todo;
    const over = t.due < TODAY && t.status !== 'done';
    return `
      <div class="task-item flex items-center gap-3 p-3 rounded-xl border border-transparent transition-colors mb-1">
        <button onclick="dbToggleDone(${t.id},'${t.status}')"
          class="w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center transition-colors
            ${t.status==='done'?'bg-green-400 border-green-400':'border-gray-300 hover:border-amber-400'}">
          ${t.status==='done'?'<svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>':''}
        </button>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium ${t.status==='done'?'line-through text-gray-300':'text-gray-800'} truncate">${t.title}</div>
          <div class="text-xs text-gray-400 mt-0.5">${t.assignee} · ${over?`<span class="text-pink-400">⚠️ ${t.due}</span>`:t.due}</div>
        </div>
        <div class="flex items-center gap-1.5 flex-shrink-0">
          ${t.priority==='high'?'<span class="text-sm">🔥</span>':''}
          <span class="status-badge ${s.bg} ${s.tx}">${s.lb}</span>
        </div>
      </div>`;
  }).join('');
}

function filterTasks(id, f) {
  document.querySelectorAll('.tf-btn').forEach(el => {
    el.className = `tf-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${el.dataset.f===f?'bg-amber-400 text-white':'bg-gray-100 text-gray-500 hover:bg-amber-50'}`;
  });
  let ts = cache.tasks.filter(t=>t.dept===id);
  if (f==='วันนี้')      ts = ts.filter(t=>t.due===TODAY);
  else if (f==='ค้าง')  ts = ts.filter(t=>t.due<TODAY && t.status!=='done');
  else if (f==='กำลังทำ') ts = ts.filter(t=>t.status==='in-progress');
  else if (f==='เสร็จแล้ว') ts = ts.filter(t=>t.status==='done');
  document.getElementById('task-list').innerHTML = taskList(ts);
}
