<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walnut Song — RungSura</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: "Sarabun", sans-serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #FBBF24; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <button id="sidebar-toggle" onclick="toggleSidebar()"
    class="flex-shrink-0 self-start mt-5 w-6 h-9 bg-white border border-gray-100 border-l-0 rounded-r-lg shadow-sm text-gray-300 hover:text-amber-500 text-xs flex items-center justify-center z-10">‹</button>
  <aside id="sidebar" class="w-56 bg-white border-r border-gray-100 flex flex-col flex-shrink-0 shadow-sm overflow-hidden transition-all duration-200">
    <div class="p-5 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-amber-400 rounded-xl flex items-center justify-center text-white font-bold shadow-sm">RS</div>
        <div><div class="font-bold text-gray-900 text-sm">RungSura</div><div class="text-xs text-gray-400">Co.,Ltd.</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-0.5">
      <a href="/walnut.html" class="px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 hover:bg-amber-50 block text-gray-600">🎵 Walnut Learning</a>
      <div class="px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 bg-amber-50 border-r-2 border-amber-400 font-semibold text-amber-800">🎼 Walnut Song</div>
    </nav>
    <div class="p-4 border-t border-gray-100">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 bg-amber-400 rounded-full flex items-center justify-center text-white text-xs font-bold">W</div>
        <div><div class="text-xs font-semibold text-gray-700">Wit</div><div class="text-xs text-gray-400">Walnut Song</div></div>
      </div>
    </div>
  </aside>
  <script>
    (function(){
      var sidebar=document.getElementById('sidebar');
      var btn=document.getElementById('sidebar-toggle');
      function apply(collapsed){
        sidebar.style.width = collapsed ? '0px' : '';
        sidebar.style.opacity = collapsed ? '0' : '1';
        sidebar.style.borderWidth = collapsed ? '0px' : '';
        btn.textContent = collapsed ? '›' : '‹';
      }
      window.toggleSidebar=function(){
        var collapsed = sidebar.dataset.collapsed !== '1';
        sidebar.dataset.collapsed = collapsed ? '1' : '0';
        localStorage.setItem('rs_sidebar_collapsed', collapsed ? '1' : '0');
        apply(collapsed);
      };
      var saved = localStorage.getItem('rs_sidebar_collapsed')==='1';
      sidebar.dataset.collapsed = saved ? '1' : '0';
      apply(saved);
    })();
  </script>

  <!-- MAIN -->
  <main id="song-scroll-container" class="flex-1 overflow-y-auto">
    <div id="app" class="p-6 max-w-3xl mx-auto"></div>
  </main>
</div>

<script src="/walnut-songs.js?v=66" onerror="document.getElementById('app').innerHTML='<div class=\'p-6 text-red-500\'>❌ walnut-songs.js โหลดไม่ได้</div>'"></script>
<script>
  document.getElementById('app').innerHTML = renderSongs();
  initSongsTab();
</script>
</body>
</html>
