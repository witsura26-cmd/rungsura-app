  if(!CFG.sbUrl||!CFG.sbKey){setStatus("ยังไม่ตั้งค่า ⚙️",false);return false;}
  try{sb=supabase.createClient(CFG.sbUrl,CFG.sbKey);setStatus("เชื่อมต่อแล้ว ✅",true);return true;}
  catch(e){setStatus("เชื่อมไม่ได้ ❌",false);return false;}
}

  const el=document.getElementById("sb-status");
  el.textContent=t; el.className="text-xs "+(ok?"text-green-500":"text-red-400");
}
function getHwState(id){return JSON.parse(localStorage.getItem("hw_"+id)||"{}");}
function saveHwState(id,s){localStorage.setItem("hw_"+id,JSON.stringify(s));}

   reading:`ร่างกายที่น่าทึ่ง — กล้ามเนื้อและกระดูก

เวลาวอลนัทร้องเพลง กล้ามเนื้อหลายมัดทำงานพร้อมกัน!

ข้อเท็จจริง:
• ร่างกายมีกระดูก 206 ชิ้น
• มีกล้ามเนื้อประมาณ 600 มัด

กระดูกทำอะไร?
1. ค้ำจุนร่างกาย
2. ปกป้องอวัยวะสำคัญ (สมอง ปอด หัวใจ)
3. เป็นที่ยึดกล้ามเนื้อ
4. สร้างเม็ดเลือดในไขกระดูก

กล้ามเนื้อ 3 ประเภท:
1. โครงร่าง — ควบคุมได้ตามใจ เช่น แขน ขา

3. เรียบ — ในอวัยวะภายใน เช่น กระเพาะ

   reading:`Chest Voice — พลังเสียงจากภายใน

Chest Voice เกิดจากสายเสียงสั่นสะเทือนอย่างเต็มที่ เสียงหนา ทรงพลัง ก้องกังวาน

ทดสอบ: วางมือบนหน้าอก ร้องเสียงต่ำๆ ช้าๆ รู้สึกสั่น = Chest Voice ✅

Warm-Up ประจำสัปดาห์ (10 นาที/วัน):
1. Lip Trill 2 นาที — เป่าลมให้ริมฝีปากสั่น
2. Humming 3 นาที — ฮัมเพลง "รักคือ" ปากปิด
3. Ma-Me-Mi-Mo-Mu 3 นาที — ร้องจากต่ำขึ้นสูง
4. Scale 2 นาที — Do Re Mi Fa Sol

เพลงฝึก: "รักคือ" — Monotone
วิธีฝึก: ร้องช้ากว่าต้นฉบับ 2 เท่า วางมือที่หน้าอก สังเกตการสั่น

function renderTasks(){
  const walnutTasks=tasks.filter(t=>t.dept===3);
  const sc={todo:{bg:"bg-gray-100",tx:"text-gray-600",lb:"รอทำ"},"in-progress":{bg:"bg-blue-100",tx:"text-blue-600",lb:"กำลังทำ"},done:{bg:"bg-green-100",tx:"text-green-600",lb:"เสร็จ"},overdue:{bg:"bg-pink-100",tx:"text-pink-600",lb:"ค้าง"}};
  return `<div class="bg-white rounded-b-2xl border border-t-0 border-gray-100 p-5">
    <div class="flex items-center justify-between mb-4">
      <div class="flex gap-1.5">
        ${["ทั้งหมด","วันนี้","ค้าง","เสร็จแล้ว"].map((f,i)=>`
          <button onclick="filterTasks(this,'${f}')" data-f="${f}"
            class="task-f px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${i===0?"bg-amber-400 text-white":"bg-gray-100 text-gray-500 hover:bg-amber-50"}">
            ${f}
          </button>`).join("")}
      </div>
      <button onclick="addTask()" class="bg-amber-400 hover:bg-amber-500 text-white px-4 py-2 rounded-xl text-sm font-semibold">+ เพิ่ม</button>
    </div>
    <div id="task-list">${taskList(walnutTasks)}</div>
  </div>`;
}
function taskList(ts){
  if(!ts.length) return '<div class="text-center text-gray-300 py-10 text-sm">ไม่มี Task</div>';
  const sc={todo:{bg:"bg-gray-100",tx:"text-gray-600",lb:"รอทำ"},"in-progress":{bg:"bg-blue-100",tx:"text-blue-600",lb:"กำลังทำ"},done:{bg:"bg-green-100",tx:"text-green-600",lb:"เสร็จ"},overdue:{bg:"bg-pink-100",tx:"text-pink-600",lb:"ค้าง"}};
  return ts.map(t=>{const s=sc[t.status]||sc.todo;const ov=t.due<TODAY&&t.status!=="done";
    return `<div class="flex items-center gap-3 p-3 rounded-xl border border-transparent hover:bg-amber-50 transition-colors mb-1">
      <button onclick="toggleDone(${t.id},'${t.status}')" class="w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center transition-colors ${t.status==="done"?"bg-green-400 border-green-400":"border-gray-300 hover:border-amber-400"}">
        ${t.status==="done"?'<svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>':''}
      </button>
      <div class="flex-1 min-w-0">
        <div class="text-sm font-medium ${t.status==="done"?"line-through text-gray-300":"text-gray-800"} truncate">${t.title}</div>
        <div class="text-xs text-gray-400">${t.assignee} · ${ov?`<span class="text-pink-400">⚠️ ${t.due}</span>`:t.due}</div>
      </div>
      <span class="status-badge ${s.bg} ${s.tx}">${s.lb}</span>
    </div>`;
  }).join("");
}
function filterTasks(btn,f){
  document.querySelectorAll(".task-f").forEach(el=>{
    el.className="task-f px-3 py-1.5 rounded-lg text-xs font-medium transition-colors "+(el.dataset.f===f?"bg-amber-400 text-white":"bg-gray-100 text-gray-500 hover:bg-amber-50");
  });
  let ts=tasks.filter(t=>t.dept===3);
  if(f==="วันนี้")ts=ts.filter(t=>t.due===TODAY);
  else if(f==="ค้าง")ts=ts.filter(t=>t.due<TODAY&&t.status!=="done");
  else if(f==="เสร็จแล้ว")ts=ts.filter(t=>t.status==="done");
  document.getElementById("task-list").innerHTML=taskList(ts);
}
async function toggleDone(id,status){
  const ns=status==="done"?"todo":"done";
  if(sb){await sb.from("tasks").update({status:ns}).eq("id",id);}
  const t=tasks.find(x=>x.id===id);if(t)t.status=ns;
  renderTasks(); document.getElementById("task-list").innerHTML=taskList(tasks.filter(t=>t.dept===3));
  switchTab("tasks");
}
async function addTask(){
  const title=prompt("ชื่อ Task:");if(!title)return;
  const assignee=prompt("ผู้รับผิดชอบ:")||"วอลนัท";
  const due=prompt("วันครบกำหนด (YYYY-MM-DD):",TODAY)||TODAY;
  if(sb){
    const{data,error}=await sb.from("tasks").insert({dept:3,title,assignee,priority:"medium",due,status:"todo"}).select().single();
    if(!error)tasks.push(data);
  }
  switchTab("tasks");
}

  document.getElementById("hw-hdr").className=`rounded-2xl p-5 mb-5 flex items-center justify-between ${l.bg} border ${l.border}`;
  document.getElementById("hw-icon").textContent=l.icon;
  document.getElementById("hw-subj").textContent=l.subject;

  document.getElementById("hw-goal").textContent="🎯 "+l.goal;
  document.getElementById("hw-content").textContent=l.reading;
  document.getElementById("hw-mcq").innerHTML=l.mcq.map((q,i)=>`
    <div class="border border-gray-100 rounded-xl p-4 bg-gray-50">
      <div class="text-sm font-medium text-gray-800 mb-3">${i+1}. ${q.q}</div>
      <div class="space-y-2">
        ${q.c.map((c,ci)=>`
          <button onclick="selMcq(${i},${ci})" data-q="${i}" data-c="${ci}"
            class="mcq-btn w-full text-left px-4 py-2.5 rounded-lg text-sm border ${hwMcqAnswers[i]===ci?"bg-amber-400 border-amber-400 text-white font-semibold":"bg-white border-gray-200 hover:border-amber-300 text-gray-700"}">
            ${c}
          </button>`).join("")}
      </div>
    </div>`).join("");
  document.getElementById("hw-written").innerHTML=l.written.map((q,i)=>`
    <div class="border border-gray-100 rounded-xl p-4 bg-gray-50">
      <div class="text-sm font-medium text-gray-800 mb-2">${i+1}. ${q.q}</div>
      <textarea rows="3" placeholder="เขียนคำตอบที่นี่..." data-wi="${i}"
        onchange="hwWrittenAnswers[${i}]=this.value"
        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-amber-400 resize-none bg-white"
      >${hwWrittenAnswers[i]||""}</textarea>
    </div>`).join("");
  if(st.submitted&&st.feedback){
    showHwResult(st);
    const btn=document.getElementById("hw-submit");
    btn.textContent="✅ ส่งแล้ว"; btn.disabled=true; btn.className="w-full bg-green-400 text-white py-3 rounded-2xl font-bold cursor-not-allowed";
  } else {
    document.getElementById("hw-result").classList.add("hidden");
    const btn=document.getElementById("hw-submit");
    btn.textContent="ส่งการบ้าน →"; btn.disabled=false; btn.className="w-full bg-amber-400 hover:bg-amber-500 text-white py-3 rounded-2xl font-bold";
  }
  document.getElementById("hw-modal").classList.remove("hidden");
  window.scrollTo(0,0);
}
function closeHw(){document.getElementById("hw-modal").classList.add("hidden");currentHwLesson=null;}
function selMcq(qi,ci){
  hwMcqAnswers[qi]=ci;
  document.querySelectorAll(`[data-q="${qi}"]`).forEach(btn=>{
    const sel=+btn.dataset.c===ci;
    btn.className="mcq-btn w-full text-left px-4 py-2.5 rounded-lg text-sm border transition-colors "+(sel?"bg-amber-400 border-amber-400 text-white font-semibold":"bg-white border-gray-200 hover:border-amber-300 text-gray-700");
  });
}
function showHwResult(st){
  const pct=Math.round((st.score/20)*100);
  const em=pct>=80?"🏆":pct>=60?"😊":"💪";
  document.getElementById("hw-result").innerHTML=`
    <div class="text-center mb-4"><div class="text-4xl mb-2">${em}</div>
      <div class="text-2xl font-bold">${st.score}/20 คะแนน</div><div class="text-sm text-gray-400">${pct}%</div></div>
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-amber-50 rounded-xl p-3 text-center"><div class="text-lg font-bold text-amber-600">${st.mcqScore}/15</div><div class="text-xs text-gray-500">เลือกตอบ</div></div>
      <div class="bg-blue-50 rounded-xl p-3 text-center"><div class="text-lg font-bold text-blue-600">${st.writtenScore}/5</div><div class="text-xs text-gray-500">เขียนตอบ</div></div>
    </div>
    ${st.feedback?`<div class="bg-gray-50 rounded-xl p-4 text-sm text-gray-700 leading-relaxed whitespace-pre-line"><div class="font-semibold mb-1">💬 ความเห็นจากครู:</div>${st.feedback}</div>`:""}`;
  document.getElementById("hw-result").classList.remove("hidden");
}
async function submitHw(){
  if(!currentHwLesson)return;
  const l=currentHwLesson;
  document.querySelectorAll("[data-wi]").forEach(el=>{hwWrittenAnswers[+el.dataset.wi]=el.value;});
  const btn=document.getElementById("hw-submit");
  btn.textContent="กำลังตรวจ..."; btn.disabled=true;
  let mcqScore=0;
  l.mcq.forEach((q,i)=>{if(hwMcqAnswers[i]===q.a)mcqScore++;});
  let writtenScore=0, feedback="";
  if(CFG.claude){
    try{
      const wtext=l.written.map((q,i)=>`ข้อ${i+1}: ${q.q}\nคำตอบ: ${hwWrittenAnswers[i]||"(ไม่ได้ตอบ)"}`).join("\n\n");
      const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:500,
          system:`คุณคือ${l.teacher} ครูของวอลนัท (8 ขวบ ป.4) กำลังตรวจการบ้านเขียนตอบ 5 ข้อ ให้คะแนน 0-1 ต่อข้อ ตอบเป็น JSON: {"scores":[0,1,0,1,1],"feedback":"ความเห็น 2-3 ประโยค ภาษาไทย อบอุ่น"}`,
          messages:[{role:"user",content:`วิชา ${l.subject} หัวข้อ ${l.title}

${wtext}`}]})});
      const data=await res.json();
      const text=data.content?.[0]?.text||"{}";
      const match=text.match(/\{[\s\S]*\}/);
      if(match){const p=JSON.parse(match[0]);writtenScore=(p.scores||[]).reduce((a,b)=>a+b,0);feedback=p.feedback||"";}
    }catch(e){writtenScore=2;feedback="ขอบคุณที่ส่งการบ้านนะคะ";}
  } else {writtenScore=2;feedback="ใส่ Claude API Key เพื่อรับการตรวจแบบละเอียดนะคะ";}
  const total=mcqScore+writtenScore;
  const st={submitted:true,mcqAnswers:hwMcqAnswers,writtenAnswers:hwWrittenAnswers,mcqScore,writtenScore,score:total,feedback,submittedAt:new Date().toISOString()};
  saveHwState(l.id,st);
  showHwResult(st);
  btn.textContent="✅ ส่งแล้ว"; btn.disabled=true; btn.className="w-full bg-green-400 text-white py-3 rounded-2xl font-bold cursor-not-allowed";
  document.getElementById("hw-result").scrollIntoView({behavior:"smooth"});
}

// ── TEACHER CHAT ─────────────────────────────────────────
function openTeacher(id){
  const m=TEAM.find(x=>x.id===id);if(!m)return;
  currentTeacher=m; teacherHistory=[];
  document.getElementById("t-header").className=`p-4 border-b flex items-center justify-between ${m.bg}`;
  document.getElementById("t-icon").textContent=m.icon;
  document.getElementById("t-icon").className=`w-10 h-10 rounded-xl flex items-center justify-center text-xl ${m.bg} border ${m.border}`;
  document.getElementById("t-name").textContent=m.name;
  document.getElementById("t-role").textContent=m.role;
  document.getElementById("t-msgs").innerHTML=`
    <div class="flex gap-2"><div class="${m.bg} w-7 h-7 rounded-full flex items-center justify-center text-base mt-0.5">${m.icon}</div>
    <div class="${m.bg} rounded-2xl rounded-tl-none px-4 py-3 text-sm max-w-xs">สวัสดีครับ! ${m.name} พร้อมช่วยเลยค่ะ 😊</div></div>`;
  document.getElementById("t-panel").classList.remove("translate-x-full");
  document.getElementById("t-overlay").classList.remove("hidden");
  setTimeout(()=>document.getElementById("t-in").focus(),100);
}
function closeTeacher(){
  document.getElementById("t-panel").classList.add("translate-x-full");
  document.getElementById("t-overlay").classList.add("hidden");
}
function addTMsg(role,text){
  const isUser=role==="user";
  const m=currentTeacher;
  document.getElementById("t-msgs").insertAdjacentHTML("beforeend",
    `<div class="flex gap-2 ${isUser?"flex-row-reverse":""}">
      <div class="w-7 h-7 rounded-full flex items-center justify-center text-base mt-0.5 ${isUser?"bg-blue-400 text-white":m.bg}">${isUser?"W":m.icon}</div>
      <div class="${isUser?"bg-blue-50 rounded-2xl rounded-tr-none ml-8":m.bg+" rounded-2xl rounded-tl-none mr-8"} px-4 py-3 text-sm whitespace-pre-wrap">${text}</div>
    </div>`);
  document.getElementById("t-msgs").scrollTop=9999;
}
async function sendTeacher(){
  const inp=document.getElementById("t-in");
  const msg=inp.value.trim();if(!msg)return;
  inp.value=""; addTMsg("user",msg); teacherHistory.push({role:"user",content:msg});
  if(!CFG.claude){addTMsg("assistant","⚠️ ใส่ Claude API Key ก่อน กด ⚙️ ครับ");return;}
  const lid="tl"+Date.now();
  document.getElementById("t-msgs").insertAdjacentHTML("beforeend",
    `<div id="${lid}" class="flex gap-2"><div class="${currentTeacher.bg} w-7 h-7 rounded-full flex items-center justify-center text-base">${currentTeacher.icon}</div><div class="${currentTeacher.bg} rounded-2xl px-4 py-3 text-sm text-gray-400 animate-pulse">กำลังคิด...</div></div>`);
  document.getElementById("t-msgs").scrollTop=9999;
  try{
    const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1024,system:currentTeacher.prompt,messages:teacherHistory})});
    const d=await r.json();
    const reply=d.content?.[0]?.text||"เกิดข้อผิดพลาด";
    document.getElementById(lid)?.remove();
    teacherHistory.push({role:"assistant",content:reply}); addTMsg("assistant",reply);
  }catch(e){document.getElementById(lid)?.remove();addTMsg("assistant","❌ "+e.message);}
}

// ── CHAT (main) ──────────────────────────────────────────
function toggleChat(){
  chatOpen=!chatOpen;
  openTeacher("tangmo");
}

// ── SETTINGS ─────────────────────────────────────────────
function openSettings(){
  document.getElementById("s-claude").value=CFG.claude;
  document.getElementById("s-url").value=CFG.sbUrl;
  document.getElementById("s-key").value=CFG.sbKey;
  document.getElementById("settings-modal").classList.remove("hidden");
}
function saveSettings(){
  localStorage.setItem("rs_claude",document.getElementById("s-claude").value.trim());
  localStorage.setItem("rs_sb_url",document.getElementById("s-url").value.trim());
  localStorage.setItem("rs_sb_key",document.getElementById("s-key").value.trim());
  location.reload();
}

// ── UTILS ────────────────────────────────────────────────
function getNextDay(dow){
  const d=new Date();const diff=(dow-d.getDay()+7)%7||7;
  d.setDate(d.getDate()+diff);
  return d.toLocaleDateString("th-TH",{day:"numeric",month:"short"});
}

// ── INIT ─────────────────────────────────────────────────
async function init(){
  if(CFG.sbUrl&&CFG.sbKey){
    try{
      sb=supabase.createClient(CFG.sbUrl,CFG.sbKey);
      setStatus("เชื่อมต่อแล้ว ✅",true);
      const{data,error}=await sb.from("tasks").select("*").eq("dept",3).order("due");
      if(!error)tasks=data;
    }catch(e){setStatus("เชื่อมไม่ได้ ❌",false);}
  } else {setStatus("ยังไม่ตั้งค่า ⚙️",false);}
  renderPage();
}
init();
</script>
